spring:
  application:
    name: auth-api

  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: admin
    password: admin123

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: minha-chave-secreta-super-segura-para-desenvolvimento-local-2024
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html